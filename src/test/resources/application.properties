spring.profiles.active=test

# Valid Base64 secret decoding to 47 bytes (>= 32 required for HS256). Note: This is just for testing and this secret should never be used in production!
app.jwt.secret=c2VjcmV0LWZvci10ZXN0aW5nLXNwcmluZy1ib290LWFwcGxpY2F0aW9uLTEyMzQ=
app.jwt.expiration-ms=3600000

app.admin.default-username=admin
app.admin.default-password=test-password-12345

spring.datasource.url=jdbc:h2:mem:papi-test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
