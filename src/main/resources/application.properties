spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${SERVER_PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${AUTH_TIMEOUT:3600000}

# Default admin (created on first boot if no users exist)
app.admin.default-username=${ADMIN_USERNAME:admin}
app.admin.default-password=${ADMIN_PASSWORD:change-me-immediately}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/default_db}
spring.datasource.username=${DB_USERNAME:papi}
spring.datasource.password=${DB_PASSWORD:password}

# Hibernate batch size (improves bulk inserts)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
